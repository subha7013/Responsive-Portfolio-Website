<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">

  <!-- Gradient -->
  <defs>
    <linearGradient id="snGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7efcff"/>
      <stop offset="50%" stop-color="#37e0e6"/>
      <stop offset="100%" stop-color="#00a6c6"/>
    </linearGradient>

    <!-- Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Letter S -->
  <path d="
      M120 80
      C40 80, 40 160, 140 160
      C240 160, 240 240, 120 240
    "
    fill="none"
    stroke="url(#snGradient)"
    stroke-width="30"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Letter N -->
  <path d="
      M300 240
      L300 80
      L430 240
      L430 80
    "
    fill="none"
    stroke="url(#snGradient)"
    stroke-width="30"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

</svg>
